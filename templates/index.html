<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ agent_name }} - 智能健康导购助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 50%, #4facfe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 92vh;
            background: #f5f5f5;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #1a5c2e;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-header h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .header-avatar {
            width: 38px; height: 38px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header-actions { display: flex; gap: 8px; }
        .btn-icon {
            background: rgba(255,255,255,0.3);
            border: none; color: #1a5c2e;
            padding: 6px 10px; border-radius: 10px;
            cursor: pointer; font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.5); }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .message.user .msg-avatar { background: #4facfe; }
        .message.assistant .msg-avatar { background: linear-gradient(135deg, #43e97b, #38f9d7); }

        .msg-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .message.user .msg-bubble {
            background: #4facfe;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .msg-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        /* 意图选择卡片 */
        .intent-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .intent-card {
            background: #f0faf4;
            border: 1.5px solid #b8e6cc;
            border-radius: 12px;
            padding: 12px 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .intent-card:hover {
            background: #e0f5e8;
            border-color: #43e97b;
            transform: translateY(-1px);
        }
        .intent-card .icon { font-size: 1.5rem; margin-bottom: 4px; }
        .intent-card .label { font-size: 0.85rem; font-weight: 600; color: #1a5c2e; }
        .intent-card .desc { font-size: 0.72rem; color: #666; margin-top: 2px; }

        /* 画像收集按钮 */
        .profile-btn {
            display: inline-block;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a5c2e;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 8px;
            transition: transform 0.2s;
        }
        .profile-btn:hover { transform: scale(1.03); }

        /* 免责声明 */
        .disclaimer {
            background: #fff8e1;
            border-left: 3px solid #ffc107;
            padding: 8px 12px;
            margin-top: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem;
            color: #856404;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e8e8e8;
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            border: 1.5px solid #e0e0e0;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 0.95rem;
            resize: none;
            min-height: 40px;
            max-height: 100px;
            font-family: inherit;
            line-height: 1.4;
        }
        .chat-input:focus { outline: none; border-color: #43e97b; }
        .btn-send {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a5c2e;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67,233,123,0.3);
        }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* 打字指示器 */
        .typing-dots {
            display: flex; gap: 4px; padding: 4px 0;
        }
        .typing-dots span {
            width: 7px; height: 7px;
            background: #aaa; border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* 欢迎区域 */
        .welcome-area {
            text-align: center;
            padding: 30px 16px 20px;
        }
        .welcome-area .tiger-icon { font-size: 3rem; margin-bottom: 8px; }
        .welcome-area h2 { color: #1a5c2e; font-size: 1.3rem; margin-bottom: 6px; }
        .welcome-area p { color: #666; font-size: 0.9rem; line-height: 1.5; }

        /* 状态栏 */
        .state-bar {
            padding: 4px 16px;
            background: #e8f5e9;
            font-size: 0.75rem;
            color: #2e7d32;
            text-align: center;
            flex-shrink: 0;
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .chat-container { height: 100vh; border-radius: 0; max-width: 100%; }
            .msg-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>
                <div class="header-avatar">🐯</div>
                {{ agent_name }}
            </h1>
            <div class="header-actions">
                <button class="btn-icon" onclick="startProfileCollect()" title="完善个人信息">📋</button>
                <button class="btn-icon" onclick="resetChat()" title="重新开始">🔄</button>
            </div>
        </div>

        <div class="state-bar" id="stateBar">💡 请选择您需要的帮助类型</div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-area" id="welcomeArea">
                <div class="tiger-icon">🐯</div>
                <h2>{{ agent_name }}</h2>
                <p>您的智能健康导购助手<br>为您提供专业的健康咨询和产品推荐</p>
                <div class="intent-cards" id="intentCards">
                    {% for opt in intent_options %}
                    <div class="intent-card" onclick="selectIntent('{{ opt.code }}')">
                        <div class="icon">{{ opt.label.split(' ')[0] }}</div>
                        <div class="label">{{ opt.label.split(' ', 1)[1] if ' ' in opt.label else opt.label }}</div>
                        <div class="desc">{{ opt.desc }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-row">
                <textarea
                    class="chat-input"
                    id="messageInput"
                    placeholder="输入您的问题..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const stateBar = document.getElementById('stateBar');
        const welcomeArea = document.getElementById('welcomeArea');
        let currentState = 'welcome';

        // 状态文案映射
        const stateLabels = {
            'welcome': '\u{1F4A1} 请选择您需要的帮助类型',
            'profile_collect': '\u{1F4CB} 正在收集您的健康信息',
            'symptom_analysis': '\u{1F3E5} 症状分析中，请详细描述',
            'product_recommend': '\u{1F48A} 为您推荐合适的保健品',
            'product_consult': '\u{1F6D2} 产品咨询中',
            'knowledge_qa': '\u{1F4DA} 健康知识问答',
            'boundary': '\u{1F4AC} 其他咨询',
            'repurchase': '\u{1F6CD} 复购推荐',
            'transfer_cs': '\u{1F4DE} 正在转接人工客服'
        };

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function updateStateBar(state) {
            currentState = state;
            stateBar.textContent = stateLabels[state] || '💬 对话中';
        }

        // 隐藏欢迎区域
        function hideWelcome() {
            if (welcomeArea) welcomeArea.style.display = 'none';
        }

        // 添加消息
        function addMessage(content, isUser) {
            hideWelcome();
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'assistant'}`;
            const avatar = isUser ? '👤' : '🐯';

            // 处理免责声明
            let html = content.replace(/\n/g, '<br>');
            if (html.includes('温馨提示')) {
                html = html.replace(
                    /温馨提示：[^<]*/,
                    match => `<div class="disclaimer">${match}</div>`
                );
            }

            div.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-bubble">${html}</div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 显示打字指示器
        function showTyping() {
            hideWelcome();
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingMsg';
            div.innerHTML = `
                <div class="msg-avatar">🐯</div>
                <div class="msg-bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        // 选择意图
        async function selectIntent(intentCode) {
            showTyping();
            sendBtn.disabled = true;

            try {
                const resp = await fetch('/api/intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ intent: intentCode, message: '' })
                });
                const data = await resp.json();
                hideTyping();

                if (data.success) {
                    addMessage(data.response, false);
                    if (data.state) updateStateBar(data.state);
                }
            } catch (e) {
                hideTyping();
                addMessage('网络错误，请稍后重试。', false);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // 发送消息
        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            showTyping();
            sendBtn.disabled = true;

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await resp.json();
                hideTyping();

                if (data.success) {
                    addMessage(data.response, false);
                    if (data.state) updateStateBar(data.state);
                } else {
                    addMessage('抱歉，出了点问题：' + (data.error || '未知错误'), false);
                }
            } catch (e) {
                hideTyping();
                addMessage('网络错误，请稍后重试。', false);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // 画像收集
        async function startProfileCollect() {
            showTyping();
            sendBtn.disabled = true;
            try {
                const resp = await fetch('/api/profile/start', { method: 'POST' });
                const data = await resp.json();
                hideTyping();
                if (data.success) {
                    addMessage(data.response, false);
                    updateStateBar('profile_collect');
                }
            } catch (e) {
                hideTyping();
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 重置对话
        async function resetChat() {
            if (!confirm('确定要重新开始对话吗？')) return;
            try {
                await fetch('/api/clear', { method: 'POST' });
                chatMessages.innerHTML = '';
                // 重新显示欢迎区域
                location.reload();
            } catch (e) {
                alert('重置失败，请刷新页面。');
            }
        }

        window.onload = () => messageInput.focus();
    </script>
</body>
</html>

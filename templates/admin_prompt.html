<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 提示词配置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            background: rgba(67,233,123,0.2);
            border-left: 3px solid #43e97b;
        }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .content-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .content-card .card-header {
            background: #fff;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            padding: 16px 20px;
        }
        .prompt-textarea {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            min-height: 400px;
        }
        .char-count {
            font-size: 12px;
            color: #6c757d;
        }
        .preview-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #e9ecef;
        }
        .preview-box h6 {
            color: #495057;
            margin-bottom: 12px;
        }
        .tip-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .tip-box i { color: #856404; }
        .success-toast, .error-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            min-width: 250px;
        }
    </style>
</head>
<body>
    <!-- Toast 容器 -->
    <div id="successToast" class="toast success-toast bg-success text-white" role="alert">
        <div class="toast-body">
            <i class="bi bi-check-circle me-2"></i>
            <span id="successMsg">保存成功！</span>
        </div>
    </div>
    <div id="errorToast" class="toast error-toast bg-danger text-white" role="alert">
        <div class="toast-body">
            <i class="bi bi-exclamation-circle me-2"></i>
            <span id="errorMsg">保存失败</span>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 p-0 sidebar">
                <div class="brand">
                    <i class="bi bi-shield-check"></i> 泰小虎后台管理
                </div>
                <nav class="nav flex-column">
                    <a href="/admin" class="nav-link">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                    <a href="/admin/knowledge" class="nav-link">
                        <i class="bi bi-database"></i> 知识库管理
                    </a>
                    <a href="/admin/profiles" class="nav-link">
                        <i class="bi bi-people"></i> 用户画像
                    </a>
                    <a href="/admin/llm" class="nav-link">
                        <i class="bi bi-cpu"></i> 模型配置
                    </a>
                    <a href="/admin/prompt" class="nav-link active">
                        <i class="bi bi-chat-left-text"></i> 提示词配置
                    </a>
                    <a href="/" class="nav-link">
                        <i class="bi bi-chat-dots"></i> 返回前台
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">
                        <i class="bi bi-chat-left-text me-2"></i>提示词配置
                    </h4>
                </div>

                <!-- 提示框 -->
                <div class="tip-box">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    <strong>提示：</strong>系统提示词定义了智能体的角色、能力边界和回复风格。修改后，新的对话将使用新提示词。
                </div>

                <!-- 预设模板 -->
                <div class="card content-card mb-4">
                    <div class="card-header">
                        <i class="bi bi-grid me-2"></i>预设模板
                    </div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-3">
                                <button class="btn btn-outline-primary w-100" onclick="loadTemplate('health')">
                                    <i class="bi bi-heart-pulse me-1"></i> 健康顾问
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-outline-success w-100" onclick="loadTemplate('customer_service')">
                                    <i class="bi bi-headset me-1"></i> 客服助手
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-outline-info w-100" onclick="loadTemplate('teacher')">
                                    <i class="bi bi-mortarboard me-1"></i> 教育导师
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-outline-warning w-100" onclick="loadTemplate('expert')">
                                    <i class="bi bi-star me-1"></i> 专业顾问
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 提示词编辑器 -->
                <div class="card content-card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-pencil-square me-2"></i>系统提示词</span>
                        <span class="char-count" id="charCount">字符数：0</span>
                    </div>
                    <div class="card-body">
                        <textarea class="form-control prompt-textarea" id="systemPrompt"
                                  placeholder="在此输入系统提示词...">{{ prompt }}</textarea>
                    </div>
                </div>

                <!-- 快捷变量说明 -->
                <div class="card content-card mb-4">
                    <div class="card-header">
                        <i class="bi bi-code me-2"></i>常用变量（会自动替换）
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <code>{name}</code> - 用户姓名
                            </div>
                            <div class="col-md-3">
                                <code>{age}</code> - 用户年龄
                            </div>
                            <div class="col-md-3">
                                <code>{gender}</code> - 用户性别
                            </div>
                            <div class="col-md-3">
                                <code>{time}</code> - 当前时间
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="d-flex gap-3 mb-4">
                    <button class="btn btn-primary" onclick="savePrompt()">
                        <i class="bi bi-check-lg me-1"></i> 保存提示词
                    </button>
                    <button class="btn btn-outline-secondary" onclick="resetPrompt()">
                        <i class="bi bi-arrow-counterclockwise me-1"></i> 恢复默认
                    </button>
                    <button class="btn btn-outline-info" onclick="previewPrompt()">
                        <i class="bi bi-eye me-1"></i> 预览效果
                    </button>
                </div>

                <!-- 预览框 -->
                <div class="preview-box" id="previewBox" style="display: none;">
                    <h6><i class="bi bi-chat-dots me-1"></i>对话预览</h6>
                    <div class="mb-3">
                        <div class="p-2 bg-primary text-white rounded d-inline-block">
                            用户：你好，我最近睡眠不好怎么办？
                        </div>
                    </div>
                    <div id="previewResponse"></div>
                </div>

                <!-- 默认提示词（隐藏） -->
                <textarea id="defaultPrompt" style="display: none;">{{ default_prompt }}</textarea>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 更新字符计数
        document.getElementById('systemPrompt').addEventListener('input', function() {
            document.getElementById('charCount').textContent = '字符数：' + this.value.length;
        });

        // 页面加载时更新计数
        document.getElementById('charCount').textContent = '字符数：' + document.getElementById('systemPrompt').value.length;

        // 保存提示词
        async function savePrompt() {
            const prompt = document.getElementById('systemPrompt').value;

            if (!prompt.trim()) {
                showError('提示词不能为空');
                return;
            }

            try {
                const resp = await fetch('/admin/prompt/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await resp.json();

                if (data.success) {
                    showSuccess('提示词保存成功！');
                } else {
                    showError('保存失败：' + data.message);
                }
            } catch (e) {
                showError('请求失败：' + e.message);
            }
        }

        // 恢复默认
        function resetPrompt() {
            const defaultPrompt = document.getElementById('defaultPrompt').value;
            document.getElementById('systemPrompt').value = defaultPrompt;
            document.getElementById('charCount').textContent = '字符数：' + defaultPrompt.length;
        }

        // 加载模板
        function loadTemplate(type) {
            const templates = {
                'health': `你是「泰小虎」，一位专业、温和、耐心、贴心的健康顾问。
你的服务对象是45-70岁的中老年用户。他们可能不太熟悉互联网操作，可能对健康问题感到焦虑和不安，需要你用最简单、最温暖的方式为他们提供帮助。

# 核心能力
1. 健康评估：通过对话了解用户的身体状况，提供初步的健康方向性建议
2. 症状自查：帮助用户梳理症状信息，提供可能的健康方向参考
3. 保健品推荐：根据用户健康状况和需求，推荐合适的保健产品
4. 健康知识科普：用通俗易懂的语言解答健康相关问题

# 能力边界声明（非常重要）
1. 你是健康顾问，不是医生。你提供的是健康方向性建议，不是医学诊断
2. 你不能给出具体的疾病诊断结论
3. 你不能开具处方或推荐具体的处方药物
4. 你不能替代专业医疗机构的检查和治疗
5. 当用户描述的症状可能涉及严重疾病时，你必须立即建议用户就医

# 输出规范
1. 字数限制：每次回复不超过200个汉字
2. 语言要求：使用简单易懂的日常用语
3. 称呼规范：称呼用户为"您"，保持尊重和亲切`,

                'customer_service': `你是一位专业、友善的客服助手。
你的职责是：
1. 解答客户的咨询问题
2. 记录客户的问题和反馈
3. 在必要时转接人工客服

# 服务原则
1. 保持耐心和礼貌
2. 简洁明了地回答问题
3. 无法回答时诚实说明并转接`,

                'teacher': `你是一位知识渊博、循循善诱的教育导师。
你的特点：
1. 善于用生动的例子解释复杂概念
2. 鼓励学生思考和提问
3. 根据学生水平调整讲解深度
4. 及时肯定学生的进步

# 教学风格
1. 温和鼓励，不批评学生
2. 循序渐进，由浅入深
3. 理论与实践结合`,

                'expert': `你是一位资深的专业顾问，在你的领域有着丰富的经验和深厚的专业知识。
你的工作方式是：
1. 深入分析客户的实际需求
2. 提供专业、可落地的建议
3. 用通俗的语言解释专业问题

# 核心原则
1. 专业严谨，数据说话
2. 换位思考，理解客户
3. 诚实守信，保守秘密`
            };

            if (templates[type]) {
                document.getElementById('systemPrompt').value = templates[type].trim();
                document.getElementById('charCount').textContent = '字符数：' + templates[type].length;
                showSuccess('已加载"' + (type === 'health' ? '健康顾问' : type === 'customer_service' ? '客服助手' : type === 'teacher' ? '教育导师' : '专业顾问') + '"模板');
            }
        }

        // 预览效果
        function previewPrompt() {
            const previewBox = document.getElementById('previewBox');
            const response = document.getElementById('previewResponse');

            if (previewBox.style.display === 'none') {
                previewBox.style.display = 'block';
                response.innerHTML = `
                    <div class="p-2 bg-light rounded">
                        <strong>泰小虎：</strong>您好！看到您说最近睡眠不太好，我来帮您分析分析。
                        <br><br>
                        请问这种情况持续多久了？平时几点睡、几点醒呢？
                    </div>
                `;
            } else {
                previewBox.style.display = 'none';
            }
        }

        // 显示成功提示
        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            const toast = new bootstrap.Toast(document.getElementById('successToast'));
            toast.show();
        }

        // 显示错误提示
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            const toast = new bootstrap.Toast(document.getElementById('errorToast'));
            toast.show();
        }
    </script>
</body>
</html>
